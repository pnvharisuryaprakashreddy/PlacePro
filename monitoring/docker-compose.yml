# Local Prometheus + Grafana stack for PlacePro monitoring (development/demo).
#
#   cd monitoring
#   docker compose up -d
#
# Prometheus UI: http://localhost:9090
# Grafana UI:    http://localhost:3000  (login admin / admin)
#
# The scrape config (prometheus.yml) is pre-populated to scrape a PlacePro
# client running on the host machine at localhost:9400.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: placepro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # Needed on Linux so host.docker.internal resolves to the host machine
    # (Docker Desktop on macOS/Windows provides it automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: placepro-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
